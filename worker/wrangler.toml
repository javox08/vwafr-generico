name = "vwafr-telegram"
main = "worker.js"
compatibility_date = "2024-11-01"

# Cron: dispara cada 20 minutos. El worker envía con ~34% de probabilidad,
# así que de media sale ~1 mensaje/hora con horario irregular.
[triggers]
crons = ["*/20 * * * *"]

# Destinos: ids separados por coma (los grupos empiezan por -100…).
# Puedes ponerlos aquí o en el panel de Cloudflare (Settings → Variables).
[vars]
CHAT_IDS = ""
# APY que se anuncia de Bitunix en el promo (texto libre).
BITUNIX_APY = "hasta 20%"
# Enlace al bot que se incluye en el aviso de "ruta actualizada".
BOT_URL = "https://vwafr-generico.pages.dev/"
# Trading real en Bitunix: "dry" (no opera, por defecto) o "live" (opera de verdad).
BITUNIX_TRADE = "dry"
BITUNIX_SYMBOL = "BTCUSDT"
BITUNIX_QTY = "auto"
# Apalancamiento usado por el tamaño "auto" (toda la cuenta x este factor).
# Bitunix solo acepta apalancamientos ENTEROS: el worker fija solo el entero
# superior (1.1 -> 2x cruzado) y el riesgo real 1.1x lo pone el tamaño de la orden.
BITUNIX_LEV = "1.1"
# Estrategia que se tradea y anuncia: "momaccel" (Aceleración de momentum, el bot
# aprobado 8/8), "robmom" (Momentum robusto) o "consensus" (consenso de bots).
BITUNIX_STRATEGY = "robmom"

# KV para detectar cambios de ruta y avisar solo cuando cambia (créalo y pega el id):
#   npx wrangler kv namespace create VWAFR_KV
# [[kv_namespaces]]
# binding = "VWAFR_KV"
# id = "PEGA_AQUI_EL_ID"

# Secretos (NO van aquí). Se ponen con wrangler secret put NOMBRE:
#   TELEGRAM_TOKEN                                          (Telegram)
#   X_API_KEY X_API_SECRET X_ACCESS_TOKEN X_ACCESS_SECRET   (X / Twitter)
#   LINKEDIN_TOKEN LINKEDIN_AUTHOR                          (LinkedIn)
#   BITUNIX_API_KEY BITUNIX_API_SECRET                      (trading, solo si live)
