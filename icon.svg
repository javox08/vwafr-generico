<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1320"/>
      <stop offset="1" stop-color="#07090E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#6E8BFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6E8BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- línea de tendencia -->
  <path d="M96 360 L188 300 L284 232 L416 132" fill="none" stroke="#6E8BFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" filter="url(#soft)"/>
