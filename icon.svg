  <!-- velas alcistas -->
  <g stroke="#1FE0A0" stroke-width="10" stroke-linecap="round">
    <line x1="148" y1="300" x2="148" y2="392"/>
    <line x1="244" y1="232" x2="244" y2="340"/>
    <line x1="356" y1="150" x2="356" y2="276"/>
  </g>
  <g fill="#1FE0A0">
    <rect x="128" y="320" width="40" height="56" rx="9"/>
    <rect x="224" y="252" width="40" height="68" rx="9"/>
    <rect x="336" y="172" width="40" height="76" rx="9"/>
  </g>
  <!-- punto vivo en el último máximo -->
  <circle cx="416" cy="132" r="15" fill="#1FE0A0"/>
  <circle cx="416" cy="132" r="26" fill="none" stroke="#1FE0A0" stroke-width="4" opacity="0.4"/>
